<!DOCTYPE html>
<html lang="en">

<head>
    <title>Counter</title>
    <script>
        let counter = 0;
        
        function count() {
            counter += 1;
            document.querySelector("h1").innerHTML = counter;
            
            if (counter % 10 === 0){
                alert(`Counter is now ${counter}`);
            }
        }

        document.querySelector("button").onclick = count;

    </script>
</head>

<body>
    <h1>0</h1>
    <button onclick="count()">Click Here</button>
</body>

</html>
